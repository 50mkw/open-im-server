username: ''
password: ''
producerAck:
compressType: none
# address and tls below are ignored when clusters is non-empty
address: [ localhost:19094 ]
toRedisTopic: toRedis
toMongoTopic: toMongo
toPushTopic: toPush
toOfflinePushTopic: toOfflinePush
toRedisGroupID: redis
toMongoGroupID: mongo
toPushGroupID: push
toOfflinePushGroupID: offlinePush
tls:
  enableTLS: false
  caCrt:
  clientCrt:
  clientKey:
